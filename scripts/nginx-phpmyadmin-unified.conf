server {
    listen 8080;
    server_name localhost;

    root /data/data/com.termux/files/home/server/sites;
    index index.php index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Bloqueia acessos indesejados
    location ~ /\.(ht|git) {
        deny all;
    }

    # Alias para o phpMyAdmin (pasta principal)
    location /phpmyadmin/ {
        alias /data/data/com.termux/files/home/server/sites/phpmyadmin/;
        index index.php;
    }

    # Resolução específica para scripts PHP dentro do alias do phpMyAdmin
    location ~ ^/phpmyadmin/(.+\.php)$ {
        alias /data/data/com.termux/files/home/server/sites/phpmyadmin/$1;
        
        # Ajuste a porta do fastcgi_pass de acordo com o seu php-fpm
        fastcgi_pass 127.0.0.1:9000;
        
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }

    # Regra padrão para outros scripts PHP no root do servidor
    location ~ \.php$ {
        root /data/data/com.termux/files/home/server/sites;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME $request_filename;
    }
}
