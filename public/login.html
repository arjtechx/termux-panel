<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Termux cPanel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f1f3f6 0%, #e2e8f0 100%);
        }
        
        body.dark-neon {
            background: linear-gradient(135deg, #020203 0%, #0a0a0c 100%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        body.dark-neon .login-card {
            background: rgba(10, 10, 12, 0.8);
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .login-header h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--surface-color);
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .btn-login:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .error-msg {
            color: var(--danger-color);
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body class="light-pro">
    <div class="login-card">
        <div class="login-header">
            <h1>☁️ Termux cPanel</h1>
            <p>Faça login para gerenciar seu servidor</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="Seu usuário" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn-login">Acessar Painel</button>
            <div id="errorMsg" class="error-msg">Usuário ou senha incorretos.</div>
        </form>
    </div>

    <script>
        // Sincronizar tema com o localStorage
        const savedTheme = localStorage.getItem('theme') || 'light-pro';
        document.body.className = savedTheme;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass })
                });

                const data = await res.json();
                if (data.success) {
                    window.location.href = '/index.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = data.error || 'Erro ao fazer login';
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Erro de conexão com o servidor';
            }
        });
    </script>
</body>
</html>
